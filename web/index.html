<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riskcore — Equity Risk Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        header {
            background: #000000;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-status {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .connection-status {
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .message-bar {
            background: #252525;
            padding: 0.7rem 1.5rem;
            border-bottom: 1px solid #333333;
            font-size: 0.8rem;
            color: #888888;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-card {
            background: #2a2a2a;
            border: 1px solid #404040;
            padding: 1rem 1.2rem;
            text-align: center;
        }

        .metric-label {
            font-size: 0.85rem;
            color: #888888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 1.6rem;
            font-weight: 600;
            color: #00cc88;
            font-family: 'Monaco', 'Courier New', monospace;
            margin-top: 0.3rem;
        }

        .metric-value.negative {
            color: #ff5555;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .chart-container {
            background: #2a2a2a;
            border: 1px solid #404040;
            padding: 1rem 1.2rem;
            position: relative;
        }

        .chart-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #d0d0d0;
        }

        .chart-wrapper {
            position: relative;
            height: 220px;
        }

        .tables {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .table-container {
            background: #2a2a2a;
            border: 1px solid #404040;
            padding: 1rem 1.2rem;
            overflow-x: auto;
        }

        .table-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #d0d0d0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: #1a1a1a;
            padding: 0.5rem 0.7rem;
            text-align: left;
            color: #888888;
            font-weight: 600;
            border-bottom: 1px solid #404040;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 0.5rem 0.7rem;
            border-bottom: 1px solid #333333;
        }

        tr:hover {
            background: #1a1a1a;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.long {
            background: #1a4d2e;
            color: #00cc88;
        }

        .badge.short {
            background: #4d1a1a;
            color: #ff9999;
        }

.live-feed {
            background: #2a2a2a;
            border: 1px solid #404040;
            padding: 1rem 1.2rem;
            margin-top: 1.5rem;
        }

        .feed-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #d0d0d0;
        }

        .feed-item {
            padding: 0.4rem 0;
            border-bottom: 1px solid #333333;
            font-size: 0.85rem;
            color: #888888;
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-time {
            color: #00cc88;
            font-weight: 600;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>RISKCORE</h1>
        <div class="header-status">
            <div class="status-dot" id="statusDot"></div>
            <div class="connection-status" id="connectionStatus">Connecting...</div>
            <div style="font-size: 0.85rem; color: #7a8fa6;" id="clockDisplay">00:00:00</div>
        </div>
    </header>

    <div class="message-bar" id="messageBar">
        Waiting for first message...
    </div>

    <div class="container">
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Portfolio VaR</div>
                <div class="metric-value" id="portfolioVar">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Net Exposure</div>
                <div class="metric-value" id="netExposure">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Sharpe Ratio</div>
                <div class="metric-value" id="sharpeRatio">—</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Calc Time</div>
                <div class="metric-value" id="calcTime">—</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">Portfolio Risk Trend</div>
            <div class="chart-wrapper">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <div class="charts">
            <div class="chart-container">
                <div class="chart-title">VaR by Ticker</div>
                <div class="chart-wrapper">
                    <canvas id="varChart"></canvas>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-title">Sharpe Ratio by Ticker</div>
                <div class="chart-wrapper">
                    <canvas id="sharpeChart"></canvas>
                </div>
            </div>
        </div>

        <div class="tables">
            <div class="table-container">
                <div class="table-title">Positions</div>
                <table id="positionsTable">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Side</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>VaR 95%</th>
                            <th>P&L</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="table-container">
                <div class="table-title">Greeks</div>
                <table id="greeksTable">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Delta</th>
                            <th>Gamma</th>
                            <th>Vega</th>
                            <th>Theta</th>
                            <th>IV %</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="live-feed">
            <div class="feed-title">Live Feed (Last 5 Events)</div>
            <div id="liveFeed"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let charts = {};
        let feedItems = [];
        let trendData = { timestamps: [], var: [], exposure: [], sharpe: [] };
        const MAX_FEED_ITEMS = 5;
        const MAX_TREND_POINTS = 60;

        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(value);
        }

        function formatPercent(value) {
            return (value * 100).toFixed(2) + '%';
        }

        function formatNumber(value) {
            return value.toLocaleString('en-US', { maximumFractionDigits: 2 });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clockDisplay').textContent =
                now.toLocaleTimeString('en-US', { hour12: false });
        }

        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8080/stream');

            ws.onopen = () => {
                document.getElementById('statusDot').classList.remove('offline');
                document.getElementById('connectionStatus').textContent = 'Connected';
                addFeedItem('WebSocket connected');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateDashboard(data);
                    addFeedItem(data.last_update_desc || 'Data updated');
                } catch (error) {
                    console.error('Failed to parse message:', error);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                document.getElementById('messageBar').textContent = 'WebSocket error';
            };

            ws.onclose = () => {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('connectionStatus').textContent = 'Disconnected';
                addFeedItem('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function updateDashboard(data) {
            // Update metrics
            document.getElementById('portfolioVar').textContent = formatCurrency(data.portfolio_var);
            document.getElementById('netExposure').textContent = formatCurrency(data.net_exposure);
            document.getElementById('calcTime').textContent = data.calc_time_ms.toFixed(1) + 'ms';

            const sharpeEl = document.getElementById('sharpeRatio');
            sharpeEl.textContent = data.portfolio_sharpe.toFixed(2);
            sharpeEl.classList.toggle('negative', data.portfolio_sharpe < 0);

            // Update message bar
            document.getElementById('messageBar').textContent =
                `Last update: ${data.timestamp} | Calc time: ${data.calc_time_ms.toFixed(1)}ms`;

            // Update positions table
            const positionsTbody = document.querySelector('#positionsTable tbody');
            positionsTbody.innerHTML = '';
            for (const pos of data.positions) {
                const row = document.createElement('tr');
                const badgeClass = pos.side === 'LONG' ? 'long' : 'short';
                row.innerHTML = `
                    <td><strong>${pos.ticker}</strong></td>
                    <td><span class="badge ${badgeClass}">${pos.side}</span></td>
                    <td>${pos.quantity}</td>
                    <td>${formatNumber(pos.price || 0)}</td>
                    <td>${formatCurrency(pos.var_95)}</td>
                    <td style="color: ${pos.pnl >= 0 ? '#4ade80' : '#ef4444'}">${formatCurrency(pos.pnl)}</td>
                `;
                positionsTbody.appendChild(row);
            }

            // Update Greeks table
            const greeksTbody = document.querySelector('#greeksTable tbody');
            greeksTbody.innerHTML = '';
            for (const pos of data.positions) {
                const g = pos.greeks;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${pos.ticker}</strong></td>
                    <td>${formatNumber(g.delta)}</td>
                    <td>${formatNumber(g.gamma)}</td>
                    <td>${formatNumber(g.vega)}</td>
                    <td>${formatNumber(g.theta)}</td>
                    <td>${formatNumber(g.iv)}</td>
                `;
                greeksTbody.appendChild(row);
            }

            // Update charts
            updateVarChart(data.positions);
            updateSharpeChart(data.positions);
            updateTrendChart(data.portfolio_var, data.net_exposure, data.portfolio_sharpe);
        }

function updateVarChart(positions) {
            const ctx = document.getElementById('varChart');
            const labels = positions.map(p => p.ticker);
            const data = positions.map(p => p.var_95);

            if (charts.var) {
                charts.var.data.labels = labels;
                charts.var.data.datasets[0].data = data;
                charts.var.update();
            } else {
                charts.var = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'VaR (95%)',
                            data: data,
                            backgroundColor: '#3b82f6',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                grid: { color: '#2a3f5f' },
                                ticks: { color: '#7a8fa6' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#7a8fa6' }
                            }
                        }
                    }
                });
            }
        }

        function updateSharpeChart(positions) {
            const ctx = document.getElementById('sharpeChart');
            const labels = positions.map(p => p.ticker);
            const data = positions.map(p => p.sharpe);

            if (charts.sharpe) {
                charts.sharpe.data.labels = labels;
                charts.sharpe.data.datasets[0].data = data;
                charts.sharpe.update();
            } else {
                charts.sharpe = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Sharpe Ratio',
                            data: data,
                            backgroundColor: data.map(d => d >= 0 ? '#4ade80' : '#ef4444'),
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                grid: { color: '#2a3f5f' },
                                ticks: { color: '#7a8fa6' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#7a8fa6' }
                            }
                        }
                    }
                });
            }
        }

        function updateTrendChart(portfolioVAR, netExposure, portfolioSharpe) {
            // Add new data point
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false }).substring(0, 5);
            trendData.timestamps.push(timeStr);
            trendData.var.push(portfolioVAR);
            trendData.exposure.push(netExposure / 1000000); // Convert to millions
            trendData.sharpe.push(portfolioSharpe);

            // Keep only last N points
            if (trendData.timestamps.length > MAX_TREND_POINTS) {
                trendData.timestamps.shift();
                trendData.var.shift();
                trendData.exposure.shift();
                trendData.sharpe.shift();
            }

            const ctx = document.getElementById('trendChart');
            if (charts.trend) {
                charts.trend.data.labels = trendData.timestamps;
                charts.trend.data.datasets[0].data = trendData.var;
                charts.trend.data.datasets[1].data = trendData.exposure;
                charts.trend.update();
            } else {
                charts.trend = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trendData.timestamps,
                        datasets: [
                            {
                                label: 'Portfolio VaR',
                                data: trendData.var,
                                borderColor: '#ff5555',
                                backgroundColor: 'rgba(255, 85, 85, 0.05)',
                                tension: 0.3,
                                fill: true,
                                yAxisID: 'y'
                            },
                            {
                                label: 'Net Exposure (M)',
                                data: trendData.exposure,
                                borderColor: '#00cc88',
                                backgroundColor: 'rgba(0, 204, 136, 0.05)',
                                tension: 0.3,
                                fill: true,
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: true, labels: { color: '#888888' } }
                        },
                        scales: {
                            y: {
                                type: 'linear',
                                position: 'left',
                                grid: { color: '#333333' },
                                ticks: { color: '#888888' },
                                title: { display: true, text: 'VaR ($)', color: '#888888' }
                            },
                            y1: {
                                type: 'linear',
                                position: 'right',
                                grid: { drawOnChartArea: false },
                                ticks: { color: '#888888' },
                                title: { display: true, text: 'Exposure (M$)', color: '#888888' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#888888' }
                            }
                        }
                    }
                });
            }
        }

        function addFeedItem(text) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            feedItems.unshift({ time: timeStr, text: text });
            feedItems = feedItems.slice(0, MAX_FEED_ITEMS);

            const feed = document.getElementById('liveFeed');
            feed.innerHTML = feedItems
                .map(item => `<div class="feed-item"><span class="feed-time">${item.time}</span> — ${item.text}</div>`)
                .join('');
        }

        // Initialize
        setInterval(updateClock, 1000);
        updateClock();
        connectWebSocket();
    </script>
</body>
</html>
